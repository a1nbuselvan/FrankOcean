<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank Ocean — Blonde</title>
    <meta name="description" content="Explore Blonde by Frank Ocean — an immersive listening experience for the iconic 2016 album.">
    <link rel="icon" href="Blonde.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 40%, rgba(120, 110, 60, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 70% 60%, rgba(90, 120, 80, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .landing {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px 24px;
            text-align: center;
            max-width: 600px;
            animation: fadeInUp 0.8s ease both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(32px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Album cover */
        .cover-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 120px rgba(120, 110, 60, 0.15);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: fadeInUp 0.8s ease 0.15s both;
        }

        .cover-wrapper:hover {
            transform: scale(1.03) translateY(-4px);
            box-shadow:
                0 28px 80px rgba(0, 0, 0, 0.7),
                0 0 160px rgba(120, 110, 60, 0.2);
        }

        .cover-wrapper img {
            display: block;
            width: 320px;
            height: 320px;
            object-fit: cover;
        }

        /* Album meta */
        .meta {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .meta .label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #a7a7a7;
        }

        .meta h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, #c8c8c8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meta .artist {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .meta .description {
            font-size: 14px;
            line-height: 1.7;
            color: #a7a7a7;
            max-width: 460px;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 16px;
            align-items: center;
            animation: fadeInUp 0.8s ease 0.45s both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #1db954;
            color: #000;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.2s ease,
                        background-color 0.2s ease,
                        box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background: #1ed760;
            box-shadow: 0 6px 28px rgba(29, 185, 84, 0.45);
        }

        .btn-primary:active {
            transform: scale(1.0);
        }

        .btn-primary svg {
            width: 20px;
            height: 20px;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: transparent;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.2s ease,
                        border-color 0.2s ease,
                        background-color 0.2s ease;
            text-decoration: none;
        }

        .btn-secondary:hover {
            transform: scale(1.04);
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Footer note */
        .footer-note {
            font-size: 12px;
            color: #555;
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .footer-note a {
            color: #888;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.2s ease;
        }

        .footer-note a:hover {
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .cover-wrapper img {
                width: 240px;
                height: 240px;
            }

            .meta h1 {
                font-size: 40px;
            }

            .actions {
                flex-direction: column;
            }
        }

        ::selection {
            background: rgba(29, 185, 84, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="landing">

        <div class="cover-wrapper">
            <img src="Blonde.jpg" alt="Blonde — Frank Ocean album cover">
        </div>

        <div class="meta">
            <span class="label">Studio Album</span>
            <h1>Blonde</h1>
            <p class="artist">Frank Ocean</p>
            <p class="description">
                A masterwork of introspective R&B released August 20, 2016.
                Blending lo-fi textures, ethereal vocals, and deeply personal storytelling
                across 17 unforgettable tracks.
            </p>
        </div>

        <div class="actions">
            <a class="btn-primary" href="blondealbum.html">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                Listen Now
            </a>
            <a class="btn-secondary" href="https://en.wikipedia.org/wiki/Blonde_(Frank_Ocean_album)" target="_blank" rel="noopener">
                Read More
            </a>
        </div>

        <p class="footer-note">
            Built with 🎵 — <a href="https://en.wikipedia.org/wiki/Frank_Ocean" target="_blank" rel="noopener">Learn about Frank Ocean</a>
        </p>

    </div>

</body>
</html>
