<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blonde — Frank Ocean</title>
    <meta name="description" content="Listen to Blonde by Frank Ocean — a beautiful immersive music player experience featuring all 17 tracks from the iconic 2016 album.">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Blonde.jpg" type="image/jpeg">
</head>
<body>

<div class="app">

    <!-- ═══════════════ Mobile Hamburger Toggle ═══════════════ -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="5" width="18" height="2" rx="1"/>
            <rect x="3" y="11" width="18" height="2" rx="1"/>
            <rect x="3" y="17" width="18" height="2" rx="1"/>
        </svg>
    </button>

    <!-- ═══════════════ Sidebar Overlay (Mobile) ═══════════════ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ═══════════════ Sidebar ═══════════════ -->
    <aside class="sidebar" id="sidebar">
        <!-- Logo -->
        <div class="sidebar-logo">
            <span>Blonde Player</span>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <a class="nav-item" href="index.html">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Home
            </a>
            <a class="nav-item active" href="blondealbum.html">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
                </svg>
                Blonde
            </a>
        </nav>

        <hr class="sidebar-divider">


    </aside>

    <!-- ═══════════════ Main Content ═══════════════ -->
    <main class="main-content" id="mainContent">

        <!-- ─── Album Hero ─── -->
        <section class="album-hero" id="albumHero">
            <div class="album-hero-gradient"></div>
            <div class="album-hero-content">
                <div class="album-cover-wrapper">
                    <img class="album-cover" id="albumCover" src="Blonde.jpg" alt="Blonde Album Cover">
                </div>
                <div class="album-info">
                    <span class="album-label">Album</span>
                    <h1 class="album-title">Blonde</h1>
                    <p class="album-description">
                        Frank Ocean's second studio album. A masterwork of introspective R&B, 
                        blending lo-fi textures, ethereal vocals, and deeply personal storytelling.
                    </p>
                    <div class="album-meta">
                        <span class="artist-name">Frank Ocean</span>
                        <span class="meta-dot"></span>
                        <span>2016</span>
                        <span class="meta-dot"></span>
                        <span id="albumTrackCount">17 songs</span>
                        <span class="meta-dot"></span>
                        <span id="albumDuration">—</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ─── Album Controls ─── -->
        <div class="album-controls">
            <button class="btn-play-large" id="playAllBtn" aria-label="Play all">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
            </button>
            <button class="btn-shuffle" id="shuffleToggle" aria-label="Toggle shuffle">
                <!-- Shuffle icon injected by JS -->
            </button>
            <button class="btn-like-album" id="likeAlbum" aria-label="Like album">
                <!-- Heart icon injected by JS -->
            </button>
        </div>

        <!-- ─── Track List ─── -->
        <section class="track-list-section">
            <div class="track-list-header">
                <span class="col-number">#</span>
                <span class="col-title">Title</span>
                <span class="col-duration">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="width:16px;height:16px;opacity:.7;">
                        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                    </svg>
                </span>
            </div>
            <div class="track-list" id="trackList">
                <!-- Tracks rendered by app.js -->
            </div>
        </section>

    </main>
</div>

<!-- ═══════════════ Player Bar ═══════════════ -->
<div class="player-bar hidden" id="playerBar">

    <!-- Left: Track Info -->
    <div class="player-info">
        <img class="player-album-art" id="playerAlbumArt" src="Blonde.jpg" alt="Now playing">
        <div class="player-track-details">
            <span class="player-track-name" id="playerTrackName">—</span>
            <span class="player-track-artist" id="playerTrackArtist">Frank Ocean</span>
        </div>
        <!-- Mobile playback controls (visible only on mobile) -->
        <div class="mobile-controls" id="mobileControls">
            <button class="ctrl-btn mobile-ctrl" id="mobilePrevBtn" aria-label="Previous track">
                <!-- Prev icon injected by JS -->
            </button>
            <button class="ctrl-btn play-btn mobile-ctrl" id="mobilePlayPauseBtn" aria-label="Play / Pause">
                <!-- Play/pause icon injected by JS -->
            </button>
            <button class="ctrl-btn mobile-ctrl" id="mobileNextBtn" aria-label="Next track">
                <!-- Prev icon injected by JS -->
            </button>
        </div>
        <button class="player-like-btn" id="playerLikeBtn" aria-label="Like track">
            <!-- Heart icon injected by JS -->
        </button>
    </div>

    <!-- Center: Playback Controls + Progress -->
    <div class="player-center">
        <div class="player-buttons">
            <button class="ctrl-btn" id="shuffleBtn" aria-label="Shuffle">
                <!-- Shuffle icon injected by JS -->
            </button>
            <button class="ctrl-btn" id="prevBtn" aria-label="Previous track">
                <!-- Prev icon injected by JS -->
            </button>
            <button class="ctrl-btn play-btn" id="playPauseBtn" aria-label="Play / Pause">
                <!-- Play/pause icon injected by JS -->
            </button>
            <button class="ctrl-btn" id="nextBtn" aria-label="Next track">
                <!-- Next icon injected by JS -->
            </button>
            <button class="ctrl-btn" id="repeatBtn" aria-label="Repeat">
                <!-- Repeat icon injected by JS -->
            </button>
        </div>
        <div class="player-progress">
            <span class="time-current" id="currentTime">--:--</span>
            <div class="progress-bar-wrapper" id="progressBarWrapper">
                <div class="progress-bar" id="progressBar" style="width: 0%;">
                    <div class="progress-handle" id="progressHandle"></div>
                </div>
            </div>
            <span class="time-total" id="totalTime">--:--</span>
        </div>
    </div>

    <!-- Right: Volume -->
    <div class="player-right">
        <button class="ctrl-btn" id="volumeBtn" aria-label="Volume">
            <!-- Volume icon injected by JS -->
        </button>
        <div class="volume-bar-wrapper" id="volumeBarWrapper">
            <div class="volume-bar" id="volumeBar" style="width: 70%;">
                <div class="volume-handle" id="volumeHandle"></div>
            </div>
        </div>
    </div>

</div>

<!-- Hidden Audio Element -->
<audio id="audioPlayer" preload="auto"></audio>

<!-- App Engine -->
<script src="app.js"></script>

</body>
</html>
